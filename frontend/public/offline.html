<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#2563EB" />
    <title>Boyaka — Offline</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      :root { --blue: #2563EB; --bg: #F5F5F7; --text: #1C1C1E; --muted: #6B7280; }
      @media (prefers-color-scheme: dark) {
        :root { --bg: #0C0C0F; --text: #F9FAFB; --muted: #9CA3AF; }
      }
      html, body {
        height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, 'Inter', BlinkMacSystemFont, 'Segoe UI', sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      .container {
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 24px;
        padding-bottom: calc(24px + env(safe-area-inset-bottom, 0px));
        text-align: center;
      }
      .icon-wrap {
        width: 88px;
        height: 88px;
        border-radius: 28px;
        background: #EFF6FF;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 28px;
        box-shadow: 0 4px 24px rgba(37,99,235,0.15);
      }
      @media (prefers-color-scheme: dark) {
        .icon-wrap { background: #1E3A5F; }
      }
      svg.offline-icon { width: 44px; height: 44px; }
      h1 {
        font-size: 26px;
        font-weight: 700;
        letter-spacing: -0.3px;
        margin-bottom: 12px;
        color: var(--text);
      }
      p {
        font-size: 16px;
        color: var(--muted);
        line-height: 1.6;
        max-width: 300px;
        margin-bottom: 36px;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: var(--blue);
        color: white;
        border: none;
        padding: 14px 28px;
        border-radius: 16px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        box-shadow: 0 4px 20px rgba(37,99,235,0.28);
        transition: transform 0.15s ease, opacity 0.15s ease;
        min-height: 48px;
        -webkit-tap-highlight-color: transparent;
      }
      .btn:active { transform: scale(0.97); opacity: 0.9; }
      .logo {
        position: absolute;
        top: 24px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 20px;
        font-weight: 700;
        color: var(--text);
        letter-spacing: -0.3px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <span class="logo">Boyaka</span>

      <div class="icon-wrap">
        <svg class="offline-icon" viewBox="0 0 24 24" fill="none" stroke="#2563EB" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <line x1="1" y1="1" x2="23" y2="23"></line>
          <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"></path>
          <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"></path>
          <path d="M10.71 5.05A16 16 0 0 1 22.56 9"></path>
          <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"></path>
          <path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path>
          <line x1="12" y1="20" x2="12.01" y2="20"></line>
        </svg>
      </div>

      <h1>Internet aloqasi yo'q</h1>
      <p>Ulanishni tekshiring. Qayta online bo'lganingizda Boyaka yana ishlaydi.</p>

      <button class="btn" onclick="window.location.reload()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"></polyline>
          <polyline points="1 20 1 14 7 14"></polyline>
          <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
        </svg>
        Qayta urinish
      </button>
    </div>
  </body>
</html>
