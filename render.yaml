services:
  - type: web
    name: boyaka-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: FRONTEND_URL
        sync: false
      - key: BACKEND_URL
        value: https://boyaka-1.onrender.com
      - key: PROCESS_RECURRING_ON_STARTUP
        value: false
